<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .email-form {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        input {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            width: 300px;
            max-width: 100%;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #ff5252;
        }

        .social-links {
            margin-top: 40px;
        }

        .social-links a {
            color: white;
            margin: 0 15px;
            font-size: 1.5rem;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .social-links a:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coming Soon</h1>
        <p>Something amazing is on the way. Stay tuned!</p>
        
        <div class="email-form">
            <input type="email" placeholder="Enter your email" required>
            <button>Notify Me</button>
        </div>

        <div class="social-links">
            <a href="#" title="Twitter">𝕏</a>
            <a href="#" title="Facebook">f</a>
            <a href="#" title="Instagram">📷</a>
            <a href="#" title="LinkedIn">in</a>
        </div>
    </div>
</body>
</html>
